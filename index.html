<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Problema</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
    padding:30px;
}

.container{
    background:white;
    width:350px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
}

button{
    background:blue;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
    border-radius:5px;
}

h2{
    color:#333;
}
</style>
</head>

<body>

<div class="container">
    <h2>TITULO</h2>

    <input type="number" id="dato1" placeholder="Dato 1">

    <button onclick="calcular()">Calcular</button>

    <h3 id="resultado"></h3>
</div>

<script>

function calcular(){

    let dato1 = parseFloat(document.getElementById("dato1").value);

    let resultado = dato1;

    document.getElementById("resultado").innerHTML =
    "Resultado: " + resultado;

}

</script>

</body>
</html>
